version: '3.8'

services:

  postgres:
    image: postgres:15-alpine
    container_name: ecom_postgres
    environment:
      POSTGRES_DB: ecom_db
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_pass
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecom_user -d ecom_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecom_network

  redis:
    image: redis:7-alpine
    container_name: ecom_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecom_network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ecom_backend
    environment:
      DATABASE_URL: postgresql://ecom_user@postgres:5432/ecom_db
      REDIS_URL: redis://redis:6379
      SECRET_KEY: dev-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecom_network
    restart: on-failure

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ecom_frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - ecom_network

  jenkins:
    image: jenkins/jenkins:lts
    container_name: ecom_jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ecom_network

volumes:
  postgres_data:
  redis_data:
  jenkins_home:

networks:
  ecom_network:
    driver: bridge
